name: classic_memory_game
description: A classic memory card-matching game for iOS and Android.

version: 1.2.0+12

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_mobile_ads: ^9.0.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  fluttertoast: ^9.1.0
  intl: ^0.20.2

  app_tracking_transparency: ^2.0.7
  open_store: ^0.5.0
  in_app_review: ^2.0.12
  flame_audio: ^2.12.1
  audioplayers: ^6.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/audio/
    - assets/app_icons/

  fonts:
    - family: Source
      fonts:
        - asset: assets/fonts/SourceSansPro-Regular.ttf

dependency_overrides:
  win32: ^5.5.4
  path_provider_android: ^2.2.12

flutter_intl:
  enabled: true
